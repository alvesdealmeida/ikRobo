<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IK Bot - Evolution</title>
    <style>
        :root {
            --bg-dark: #0f172a; --panel-bg: #1e293b; --accent: #ef4444;
            --path: #334155; --robot-body: #06b6d4; --wall: #f97316;
            --finish: #10b981; --pause: #3b82f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); color: white;
            display: flex; overflow: hidden; touch-action: none;
        }

        #app { display: flex; width: 100%; height: 100%; }
        
        #sidebar {
            width: 300px; background: var(--panel-bg);
            display: flex; flex-direction: column; padding: 15px;
            gap: 10px; align-items: center;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5); z-index: 10;
        }

        .header-panel { text-align: center; width: 100%; }
        .header-title { margin: 0; color: var(--robot-body); font-size: 1.1rem; }
        .level-label { background: var(--finish); border-radius: 15px; padding: 2px 10px; font-size: 0.8rem; font-weight: bold; margin: 5px 0; display: inline-block; }

        .info-container { display: flex; justify-content: space-between; width: 100%; gap: 5px; }
        .info-box { background: #000; padding: 5px; border-radius: 5px; font-size: 0.7rem; text-align: center; flex: 1; border: 1px solid #334155; }
        
        .medals-shelf {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 4px; background: rgba(0,0,0,0.4); padding: 8px;
            border-radius: 10px; width: 100%; border: 1px solid #334155;
        }
        .medal-icon { font-size: 1.1rem; filter: grayscale(1); opacity: 0.15; transition: 0.5s; text-align: center; }
        .medal-icon.earned { filter: grayscale(0); opacity: 1; transform: scale(1.1); }

        .controls-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 48px);
            gap: 8px;
            width: 100%;
            margin-top: auto;
            padding-bottom: 5px;
        }

        .btn-control, .btn-side {
            border: none; border-radius: 10px; color: white;
            cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; transition: all 0.1s;
            height: 100%; width: 100%;
        }
        .btn-control:active, .btn-side:active { transform: translateY(3px); box-shadow: none; }
        .btn-control { background: #475569; font-size: 1.3rem; }
        .btn-control:active { background: var(--robot-body); }
        .btn-side { font-size: 0.7rem; text-transform: uppercase; }
        .btn-pause { background: var(--pause); }
        .btn-quit { background: var(--accent); }

        .pos-pause { grid-column: 1 / 2; grid-row: 2; }
        .pos-up { grid-column: 3; grid-row: 1; }
        .pos-left { grid-column: 2; grid-row: 2; }
        .pos-down { grid-column: 3; grid-row: 3; }
        .pos-right { grid-column: 4; grid-row: 2; }
        .pos-quit { grid-column: 5 / 6; grid-row: 2; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #0b0f19; overflow: hidden; }
        canvas { background: var(--path); border-radius: 8px; max-width: 98%; max-height: 98%; object-fit: contain; }
        
        @media (max-width: 800px) {
            #app { flex-direction: column-reverse; }
            #sidebar { width: 100%; height: 45%; padding: 10px; }
            #game-area { height: 55%; }
            .medals-shelf { grid-template-columns: repeat(10, 1fr); }
            .controls-group { grid-template-rows: repeat(3, 40px); }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header-panel">
            <h3 class="header-title">IK BOT 🤖</h3>
            <div class="level-label">Nível <span id="lvl-num">1</span> <span id="cycle-label" style="color:yellow"></span></div>
        </div>

        <div class="info-container">
            <div class="info-box">💀 <span id="crash-count">0</span></div>
            <div class="info-box">⏱️ <span id="timer">00:00</span></div>
        </div>

        <div class="medals-shelf" id="shelf">
            <span class="medal-icon" id="m1">🥉</span><span class="medal-icon" id="m2">🥉</span>
            <span class="medal-icon" id="m3">🥉</span><span class="medal-icon" id="m4">🥈</span>
            <span class="medal-icon" id="m5">🥈</span><span class="medal-icon" id="m6">🥈</span>
            <span class="medal-icon" id="m7">🥈</span><span class="medal-icon" id="m8">🥇</span>
            <span class="medal-icon" id="m9">🥇</span><span class="medal-icon" id="m10">💎</span>
        </div>

        <div class="controls-group">
            <button id="pause-btn" class="btn-side btn-pause pos-pause" onclick="togglePause()">Pausar</button>
            <button class="btn-control pos-up" onpointerdown="changeDir('up')">↑</button>
            <button class="btn-control pos-left" onpointerdown="changeDir('left')">←</button>
            <button class="btn-control pos-down" onpointerdown="changeDir('down')">↓</button>
            <button class="btn-control pos-right" onpointerdown="changeDir('right')">→</button>
            <button class="btn-side btn-quit pos-quit" onclick="desistir()">Sair</button>
        </div>
    </div>

    <div id="game-area">
        <canvas id="stage"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    canvas.width = 1000; canvas.height = 800;

    let currentLevel = 1;
    let cycle = 1; // Contador de quantas vezes completou o jogo
    let crashes = 0;
    let seconds = 0;
    let isPaused = false;
    let isGamePaused = false;
    let medalFloatingY = 0;
    let isMirrored = false; // Alterna o formato do mapa
    
    const bot = { x: 0, y: 0, size: 28, speed: 3.5, dir: 'right', color: '#06b6d4' };

    const levels = [
        null,
        { start: {x:60, y:60}, finish: {x:900, y:700}, medal: '🥉', walls: [[250, 0, 70, 600], [600, 200, 70, 600]] },
        { start: {x:60, y:60}, finish: {x:900, y:60}, medal: '🥉', walls: [[0, 250, 800, 70], [200, 500, 800, 70]] },
        { start: {x:60, y:700}, finish: {x:900, y:60}, medal: '🥉', walls: [[300, 150, 70, 650], [600, 0, 70, 650]] },
        { start: {x:80, y:80}, finish: {x:500, y:400}, medal: '🥈', walls: [[250, 250, 500, 50], [250, 250, 50, 300]] },
        { start: {x:60, y:60}, finish: {x:920, y:720}, medal: '🥈', walls: [[180, 0, 60, 650], [400, 150, 60, 650], [620, 0, 60, 650]] },
        { start: {x:60, y:60}, finish: {x:60, y:720}, medal: '🥈', walls: [[0, 180, 850, 50], [150, 360, 850, 50]] },
        { start: {x:60, y:60}, finish: {x:900, y:700}, medal: '🥈', walls: [[220, 0, 50, 350], [480, 100, 50, 600]] },
        { start: {x:60, y:720}, finish: {x:900, y:720}, medal: '🥇', walls: [[150, 100, 40, 700], [550, 100, 40, 700]] },
        { start: {x:60, y:720}, finish: {x:900, y:60}, medal: '🥇', walls: [[0, 580, 850, 40], [0, 220, 850, 40]] },
        { start: {x:60, y:60}, finish: {x:900, y:700}, medal: '💎', walls: [[0, 180, 850, 50], [150, 380, 850, 50], [0, 580, 850, 50]] }
    ];

    function togglePause() {
        isGamePaused = !isGamePaused;
        document.getElementById('pause-btn').innerText = isGamePaused ? "Retomar" : "Pausar";
    }

    function changeDir(d) {
        if(isPaused || isGamePaused) return;
        bot.dir = d;
    }

    function desistir() {
        if(confirm("Reiniciar tudo?")) {
            location.reload();
        }
    }

    function resetPos() {
        isPaused = true;
        const lvl = levels[currentLevel];
        
        // Se estiver espelhado, inverte a posição X inicial
        bot.x = isMirrored ? (1000 - lvl.start.x - bot.size) : lvl.start.x;
        bot.y = lvl.start.y;
        bot.dir = isMirrored ? (lvl.initDir === 'right' ? 'left' : 'left') : 'right';
        
        setTimeout(() => isPaused = false, 500);
    }

    function render() {
        ctx.fillStyle = "#334155"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const lvl = levels[currentLevel];

        ctx.fillStyle = "#f97316"; // Cor das paredes
        // Bordas
        ctx.fillRect(0,0,1000,15); ctx.fillRect(0,785,1000,15);
        ctx.fillRect(0,0,15,800); ctx.fillRect(985,0,15,800);

        // Desenha paredes com lógica de espelhamento
        lvl.walls.forEach(w => {
            let wx = isMirrored ? (1000 - w[0] - w[2]) : w[0];
            ctx.fillRect(wx, w[1], w[2], w[3]);
        });

        // Chegada
        let fx = isMirrored ? (1000 - lvl.finish.x - 55) : lvl.finish.x;
        ctx.fillStyle = "#10b981"; ctx.fillRect(fx, lvl.finish.y, 55, 55);
        
        medalFloatingY = Math.sin(Date.now() / 200) * 8;
        ctx.font = "40px Arial"; ctx.textAlign = "center";
        ctx.fillText(lvl.medal, fx + 28, lvl.finish.y + 42 + medalFloatingY);

        if(!isPaused && !isGamePaused) {
            if (bot.dir === 'up') bot.y -= bot.speed;
            if (bot.dir === 'down') bot.y += bot.speed;
            if (bot.dir === 'left') bot.x -= bot.speed;
            if (bot.dir === 'right') bot.x += bot.speed;
            checkCollision(fx, lvl.finish.y);
        }

        // Desenha Bot
        ctx.fillStyle = bot.color; ctx.fillRect(bot.x, bot.y, bot.size, bot.size);
        ctx.fillStyle = "white"; ctx.fillRect(bot.x+5, bot.y+5, bot.size-10, 5);

        if(isGamePaused) {
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,1000,800);
            ctx.fillStyle = "white"; ctx.font = "bold 60px Arial"; ctx.textAlign="center"; ctx.fillText("JOGO PAUSADO", 500, 420);
        }
        requestAnimationFrame(render);
    }

    function checkCollision(finishX, finishY) {
        // Colisão com paredes (cor laranja)
        const pts = [[bot.x, bot.y], [bot.x+bot.size, bot.y], [bot.x, bot.y+bot.size], [bot.x+bot.size, bot.y+bot.size]];
        for (let p of pts) {
            const pix = ctx.getImageData(p[0], p[1], 1, 1).data;
            if (pix[0] === 249 && pix[1] === 115) { 
                crashes++; document.getElementById('crash-count').innerText = crashes;
                resetPos(); return;
            }
        }

        // Vitória no nível
        if (Math.abs(bot.x - finishX) < 40 && Math.abs(bot.y - finishY) < 40) {
            document.getElementById(`m${currentLevel}`).classList.add('earned');
            isPaused = true; // Trava o bot antes do alerta

            // Pequeno delay para o navegador renderizar o bot chegando antes do alerta
            setTimeout(() => {
                if (currentLevel < 10) {
                    currentLevel++; 
                    document.getElementById('lvl-num').innerText = currentLevel;
                    bot.speed += 0.4;
                    resetPos();
                } else { 
                    alert("INCRÍVEL! VOCÊ CONQUISTOU TODAS AS MEDALHAS!\nDificuldade Aumentada: Nível Prestígio " + cycle); 
                    startNewCycle();
                }
            }, 100);
        }
    }

    function startNewCycle() {
        cycle++;
        currentLevel = 1;
        isMirrored = !isMirrored; // Muda o formato do labirinto (espelha)
        bot.speed = 3.5 + (cycle * 0.5); // Mais rápido a cada ciclo
        
        // Reseta visual das medalhas para o novo ciclo
        for(let i=1; i<=10; i++) document.getElementById(`m${i}`).classList.remove('earned');
        
        document.getElementById('lvl-num').innerText = currentLevel;
        document.getElementById('cycle-label').innerText = `(V${cycle})`;
        resetPos();
    }

    setInterval(() => { 
        if(!isPaused && !isGamePaused) {
            seconds++; 
            const timerDisplay = document.getElementById('timer');
            let m = Math.floor(seconds/60).toString().padStart(2,'0');
            let s = (seconds%60).toString().padStart(2,'0');
            timerDisplay.innerText = `${m}:${s}`;
        }
    }, 1000);

    resetPos(); 
    render();
</script>
</body>
</html>
