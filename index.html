<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IK Bot - Fixed Path Edition</title>
    <style>
        :root { --gold: #fbbf24; --finish: #10b981; --accent: #ef4444; }
        #desktop-lock { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        @media (min-width: 1025px) { #desktop-lock { display: flex; } }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
        body { width: 100%; height: 100dvh; font-family: sans-serif; background: #000; color: white; overflow: hidden; touch-action: none; }
        #app { display: flex; width: 100%; height: 100%; flex-direction: column-reverse; }
        
        #sidebar { background: #0a0a0a; display: flex; flex-direction: column; padding: 10px; gap: 8px; z-index: 10; border-top: 2px solid #334155; height: 40%; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; }
        .level-label { background: var(--finish); border-radius: 8px; padding: 4px 12px; font-weight: bold; color: #000; font-size: 0.8rem; }

        .stats-row { display: flex; gap: 8px; }
        .info-box { background: #111; padding: 6px; border-radius: 5px; flex: 1; text-align: center; border: 1px solid #222; font-size: 0.8rem; }

        .controls-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 1fr); gap: 10px; flex: 1; max-width: 400px; margin: 0 auto; width: 100%; }
        .btn { border: none; border-radius: 12px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #000; cursor: pointer; }
        .btn:active { transform: translateY(3px); box-shadow: none; filter: brightness(1.3); }
        .btn-dir { background: #1e293b; font-size: 1.6rem; }
        .btn-pause { background: #3b82f6; grid-column: 1; grid-row: 2; }
        .btn-quit { background: var(--accent); grid-column: 5; grid-row: 2; }
        
        #game-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; background: #000; }

        #victory-modal { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; flex-direction: column; align-items: center; justify-content: center; }

        /* Crédito do Desenvolvedor */
        .dev-credit {
            text-align: center;
            font-size: 0.65rem;
            color: #475569; /* Um cinza azulado discreto */
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 5px 0;
            border-top: 1px solid #1e293b;
            margin-top: auto;
            font-family: monospace;
        }  
    </style>
</head>
<body>

    <div id="desktop-lock">
        <h1 style="color: var(--gold);">ACESSO MOBILE</h1>
        <p>Incompatível com Desktop.</p>
    </div>

    <div id="app">
        <div id="sidebar">
            <div class="header-panel">
                <div class="level-label" id="lvl-tag">SETOR 1</div>
                <div id="cycle-label" style="color: var(--gold); font-weight: bold;"></div>
            </div>
            <div class="stats-row">
                <div class="info-box">🏅 <span id="medal-val">0</span></div>
                <div class="info-box">💥 <span id="crash-count">0</span></div>
                <div class="info-box">⚡ <span id="spd-val">5</span></div>
            </div>
            <div class="controls-grid">
                <button class="btn btn-pause" id="btn-p">II</button>
                <button class="btn btn-dir" style="grid-column: 3; grid-row: 1;" onpointerdown="changeDir('up')">▲</button>
                <button class="btn btn-dir" style="grid-column: 2; grid-row: 2;" onpointerdown="changeDir('left')">◀</button>
                <button class="btn btn-dir" style="grid-column: 3; grid-row: 3;" onpointerdown="changeDir('down')">▼</button>
                <button class="btn btn-dir" style="grid-column: 4; grid-row: 2;" onpointerdown="changeDir('right')">▶</button>
                <button class="btn btn-quit" id="btn-r">R</button>
            </div>
            <div class="dev-credit">Dev: Sebastião Alves de Almeida</div>
        </div>

        <div id="game-area">
            <canvas id="stage"></canvas>
            <div id="victory-modal">
                <div style="background:#111; border:2px solid var(--gold); padding:30px; border-radius:20px; text-align:center;">
                    <h2 style="color:var(--gold)">CICLO COMPLETO</h2>
                    <button class="btn" style="background:var(--gold); color:#000; padding:15px 30px; margin-top:20px;" onclick="confirmVictory()">AVANÇAR</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 800;

    let state = { lvl: 1, cycle: 1, crashes: 0, medals: 0, walls: [], isPaused: false, isGamePaused: false, isVictory: false, theme: {bg:'#0f172a', w:'#38bdf8'} };
    const bot = { x: 60, y: 60, size: 36, speed: 5, dir: 'right', visual: '🤖' };
    const goal = { x: 700, y: 700 };

    function playSound(f, d) {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const o = ac.createOscillator(); const g = ac.createGain();
            o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + d);
            o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + d);
        } catch(e){}
    }

    // NOVA LÓGICA: Gera labirinto garantindo que áreas do bot e da bandeira fiquem limpas
    function generateSafeMaze() {
        state.walls = [];
        const numBars = 8 + (state.lvl * 2);
        
        for(let i=0; i<numBars; i++) {
            const isVert = Math.random() > 0.5;
            const w = isVert ? 30 : 100 + Math.random() * 200;
            const h = isVert ? 100 + Math.random() * 200 : 30;
            const x = 50 + Math.random() * 650;
            const y = 50 + Math.random() * 650;

            // Bloqueia criação de parede se estiver na "Safe Zone" do Bot (Início)
            if (x < 150 && y < 150) continue;
            // Bloqueia criação de parede se estiver na "Safe Zone" da Bandeira (Fim)
            if (x + w > 600 && y + h > 600) continue;

            state.walls.push({x, y, w, h});
        }
    }

    function updateTheme() {
        const themes = [
            {bg: '#0f172a', w: '#38bdf8', b: '🤖'},
            {bg: '#1e1b4b', w: '#818cf8', b: '🦾'},
            {bg: '#2d0b36', w: '#f472b6', b: '⚡'},
            {bg: '#050505', w: '#39ff14', b: '🛸'}
        ];
        state.theme = themes[state.lvl % themes.length];
        bot.visual = state.theme.b;
        document.getElementById('lvl-tag').innerText = `SETOR ${state.lvl}`;
        document.getElementById('spd-val').innerText = bot.speed;
        document.getElementById('cycle-label').innerText = `C-${state.cycle}`;
    }

    function changeDir(d) { if(!state.isGamePaused) bot.dir = d; }

    function resetPos() {
        bot.x = 60; bot.y = 60; bot.dir = 'right';
        state.isPaused = true;
        setTimeout(() => state.isPaused = false, 500);
    }

    document.getElementById('btn-r').onclick = () => location.reload();
    document.getElementById('btn-p').onclick = () => {
        state.isGamePaused = !state.isGamePaused;
        document.getElementById('btn-p').innerText = state.isGamePaused ? '▶' : 'II';
    };

    function render() {
        ctx.fillStyle = state.theme.bg; ctx.fillRect(0, 0, 800, 800);
        
        // Bordas
        ctx.fillStyle = state.theme.w;
        ctx.fillRect(0,0,800,15); ctx.fillRect(0,785,800,15);
        ctx.fillRect(0,0,15,800); ctx.fillRect(785,0,15,800);
        
        // Paredes
        state.walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

        // Meta (Sempre visível e acessível)
        ctx.fillStyle = "#10b981"; ctx.fillRect(goal.x, goal.y, 65, 65);
        ctx.font = "30px Arial"; ctx.fillText("🏁", goal.x + 12, goal.y + 45);

        if(!state.isGamePaused && !state.isVictory && !state.isPaused) {
            if(bot.dir === 'up') bot.y -= bot.speed;
            if(bot.dir === 'down') bot.y += bot.speed;
            if(bot.dir === 'left') bot.x -= bot.speed;
            if(bot.dir === 'right') bot.x += bot.speed;

            // Colisões
            let hit = (bot.x < 15 || bot.x > 785 - bot.size || bot.y < 15 || bot.y > 785 - bot.size);
            state.walls.forEach(w => {
                if(bot.x < w.x + w.w && bot.x + bot.size > w.x && bot.y < w.y + w.h && bot.y + bot.size > w.y) hit = true;
            });

            if(hit) {
                playSound(150, 0.2);
                state.crashes++;
                document.getElementById('crash-count').innerText = state.crashes;
                if(state.medals > 0) {
                    state.medals--;
                    document.getElementById('medal-val').innerText = state.medals;
                }
                resetPos();
            }

            // Vitória no Setor
            if(bot.x > 660 && bot.y > 660) {
                playSound(600, 0.2);
                state.medals++;
                document.getElementById('medal-val').innerText = state.medals;
                if(state.lvl < 5) {
                    state.lvl++; bot.speed += 0.5;
                    generateSafeMaze(); updateTheme(); resetPos();
                } else {
                    state.isVictory = true;
                    document.getElementById('victory-modal').style.display = 'flex';
                }
            }
        }

        ctx.font = "40px Arial"; ctx.fillText(bot.visual, bot.x, bot.y + 35);
        requestAnimationFrame(render);
    }

    function confirmVictory() {
        state.cycle++; state.lvl = 1; bot.speed += 1;
        state.isVictory = false;
        document.getElementById('victory-modal').style.display = 'none';
        generateSafeMaze(); updateTheme(); resetPos();
    }

    generateSafeMaze(); updateTheme(); resetPos(); render();
</script>
</body>
</html>
